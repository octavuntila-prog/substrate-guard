# Faza 5: every push/PR runs the full automated test suite (same as local "reproducing" flow).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pytest (full suite, coverage measured + bandit gate required)
        env:
          REQUIRE_BANDIT: "1"   # missing bandit -> test FAILS, never silent-skips
        run: >-
          python -m pytest tests/ -q --tb=short
          --cov=substrate_guard --cov-report=term-missing

      - name: Manual code-verifier smoke (exit code enforced)
        run: python tests/smoke_test.py

  # Lint gate (M-j): pyflakes (F) -- unused imports/vars, redefinitions, undefined names.
  # Config in pyproject.toml [tool.ruff.lint]. A `# noqa: F401` directive now actually
  # matters (e.g. the z3/bcc availability probes).
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff>=0.15"
      - name: Ruff (pyflakes gate)
        run: ruff check substrate_guard/ tests/

  # Real PostgreSQL — schema + audit path (complements unit tests; no matrix to save minutes)
  postgres-ci:
    runs-on: ubuntu-latest
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: guard
      POSTGRES_PASSWORD: ci_secret
      POSTGRES_DB: substrate
      POSTGRES_CI: "1"
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: guard
          POSTGRES_PASSWORD: ci_secret
          POSTGRES_DB: substrate
        options: >-
          --health-cmd "pg_isready -U guard -d substrate"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + Postgres driver
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,postgres]"

      - name: Apply audit schema
        run: python scripts/ci_apply_audit_schema.py

      - name: Pytest (Postgres integration only)
        run: python -m pytest tests/test_postgres_ci.py -v --tb=short -m postgres_ci

  # Builtin<->OPA/Rego parity gate (plan 1.B step 1). Installs a real opa v1.x and
  # runs the parity harness with REQUIRE_PARITY_OPA=1 so a missing binary FAILS here
  # (never a silent skip). Any NEW builtin/rego divergence turns the build red before
  # a Rego flip could silently invert an allow/deny decision on production traffic.
  policy-parity:
    runs-on: ubuntu-latest
    env:
      OPA_VERSION: v1.18.2
      SUBSTRATE_GUARD_OPA_BIN: /usr/local/bin/opa
      REQUIRE_PARITY_OPA: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Install OPA ${{ env.OPA_VERSION }} (rego uses import rego.v1 -> v1.x)
        run: |
          curl -fsSL -o /usr/local/bin/opa \
            "https://github.com/open-policy-agent/opa/releases/download/${OPA_VERSION}/opa_linux_amd64_static"
          chmod +x /usr/local/bin/opa
          opa version
      - name: Rego bundle parse-check
        run: opa check substrate_guard/policy/policies/
      - name: Builtin<->Rego parity harness
        run: python -m pytest tests/test_policy_parity.py -v --tb=short

  # Optional extended checks — enable when you want CI-time benchmark harnesses
  benchmarks:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Code verifier benchmark
        run: python -m benchmarks.run_benchmark
      - name: Tool API benchmark
        run: python -m benchmarks.run_tool_benchmark
      - name: CLI benchmark
        run: python -m substrate_guard.cli benchmark --type cli
      - name: HW benchmark
        run: python -m benchmarks.run_hw_benchmark
      - name: Distillation benchmark
        run: python -m benchmarks.run_distill_benchmark

# Faza 5: every push/PR runs the full automated test suite (same as local "reproducing" flow).
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pytest (full suite)
        run: python -m pytest tests/ -q --tb=short

      - name: Manual code-verifier smoke (exit code enforced)
        run: python tests/smoke_test.py

  # Real PostgreSQL — schema + audit path (complements unit tests; no matrix to save minutes)
  postgres-ci:
    runs-on: ubuntu-latest
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: guard
      POSTGRES_PASSWORD: ci_secret
      POSTGRES_DB: substrate
      POSTGRES_CI: "1"
    services:
      postgres:
        image: postgres:16-alpine
        ports:
          - 5432:5432
        env:
          POSTGRES_USER: guard
          POSTGRES_PASSWORD: ci_secret
          POSTGRES_DB: substrate
        options: >-
          --health-cmd "pg_isready -U guard -d substrate"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + Postgres driver
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,postgres]"

      - name: Apply audit schema
        run: python scripts/ci_apply_audit_schema.py

      - name: Pytest (Postgres integration only)
        run: python -m pytest tests/test_postgres_ci.py -v --tb=short -m postgres_ci

  # Optional extended checks — enable when you want CI-time benchmark harnesses
  benchmarks:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Code verifier benchmark
        run: python -m benchmarks.run_benchmark
      - name: Tool API benchmark
        run: python -m benchmarks.run_tool_benchmark
      - name: CLI benchmark
        run: python -m substrate_guard.cli benchmark --type cli
      - name: HW benchmark
        run: python -m benchmarks.run_hw_benchmark
      - name: Distillation benchmark
        run: python -m benchmarks.run_distill_benchmark

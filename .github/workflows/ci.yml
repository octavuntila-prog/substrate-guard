name: substrate-guard CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install z3-solver sympy
          pip install -e .

      - name: Smoke tests
        run: python tests/smoke_test.py

      - name: Code verifier benchmark (70 functions)
        run: python benchmarks/run_benchmark.py

      - name: Tool API verifier benchmark (30 definitions)
        run: python benchmarks/run_tool_benchmark.py

      - name: CLI verifier benchmark (20 commands)
        run: python substrate_guard/cli.py benchmark --type cli

      - name: Hardware verifier benchmark (21 RISC-V tests)
        run: python benchmarks/run_hw_benchmark.py

      - name: Distillation verifier benchmark (40 traces)
        run: python benchmarks/run_distill_benchmark.py

      - name: Summary
        run: |
          echo "========================================="
          echo "All 181 test cases passed on Python ${{ matrix.python-version }}"
          echo "========================================="

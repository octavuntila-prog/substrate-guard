# Heavier Hypothesis load (SUBSTRATE_FUZZ_MULTIPLIER) + full adversarial folder — not on every PR.
name: Adversarial & heavy fuzz

on:
  workflow_dispatch:
  schedule:
    # Weekly Sunday 06:00 UTC (after typical weekend merges)
    - cron: "0 6 * * 0"

jobs:
  heavy-fuzz:
    runs-on: ubuntu-latest
    env:
      SUBSTRATE_FUZZ_MULTIPLIER: "5"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package + dev tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # All @pytest.mark.fuzz tests live under test_adversarial/; multiplier scales Hypothesis.
      - name: Adversarial + fuzz (scaled Hypothesis)
        run: python -m pytest tests/test_adversarial/ -q --tb=short

# Optional SBERT / sentence-transformers smoke — skips locally without comply-ml extra.
name: Comply ML smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "30 6 * * 0"

jobs:
  sbert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install with comply-ml extra
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,comply-ml]"

      - name: Comply suite incl. semantic calibration (0.85 threshold, audit 2.A step 3)
        # Runs the WHOLE comply suite with sentence-transformers present, so the
        # calibration tests (test_calibration.py) that SKIP on the base CI actually
        # execute here: default-encoder-is-semantic, near-paraphrase >= 0.85,
        # unrelated < 0.85, and the documented loose-paraphrase-below-0.85 limit.
        run: python -m pytest tests/test_comply/ -v --tb=short

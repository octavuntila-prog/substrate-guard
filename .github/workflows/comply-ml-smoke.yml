# Optional SBERT / sentence-transformers smoke — skips locally without comply-ml extra.
name: Comply ML smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "30 6 * * 0"

jobs:
  sbert:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install with comply-ml extra
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,comply-ml]"

      - name: Semantic fingerprinter smoke
        run: python -m pytest tests/test_comply/test_fingerprinter.py::test_sbert_optional_smoke -v --tb=short

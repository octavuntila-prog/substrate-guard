# Production-style: join an EXISTING stack (Postgres + internal network).
# Copy this repo next to your main docker-compose or set build context.
#
# Layout A (this repo cloned as project root — Dockerfile at top level):
#   build.context: .
#
# Layout B (monorepo with substrate-guard subfolder):
#   build.context: ./substrate-guard
#
# Usage:
#   docker compose -f docker-compose.guard.yml build
#   docker compose -f docker-compose.guard.yml run --rm substrate-guard \
#     python -m substrate_guard.cli stack-benchmark

services:
  substrate-guard:
    build:
      context: .
      dockerfile: Dockerfile
    image: substrate-guard:local
    container_name: substrate-guard
    restart: unless-stopped
    # env_file:
    #   - .env   # uncomment when using audit against Postgres (see .env.example)
    environment:
      GUARD_MODE: mock
      GUARD_LOG_LEVEL: INFO
      PYTHONPATH: /app
    volumes:
      - guard-logs:/var/log/substrate-guard
      - ./scripts/config_docker.json:/app/config/substrate.json:ro
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import substrate_guard; print(substrate_guard.__version__)",
        ]
      interval: 60s
      timeout: 10s
      retries: 3
    networks:
      - ai-research-agency_internal

volumes:
  guard-logs:

networks:
  ai-research-agency_internal:
    external: true
